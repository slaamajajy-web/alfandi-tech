<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>دخول - الفندي TechHunter</title>
</head>
<body class="bg-gray-950 text-yellow-500 flex items-center justify-center h-screen">
    <form method="POST" class="bg-gray-900 p-8 rounded-2xl border border-yellow-600 shadow-2xl w-96">
        <h2 class="text-2xl font-bold mb-6 text-center">الوصول السيادي</h2>
        <input name="pass" type="password" placeholder="كلمة المرور السيادية" class="w-full mb-6 p-3 rounded bg-gray-800 border border-gray-700 focus:border-yellow-500 outline-none text-white">
        <button class="w-full bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-3 rounded-lg transition">دخول النظام</button>
    </form>
</body>
</html>
